plugins:
  debug:
    shortCut: Shift-D
    description: Add debug container
    dangerous: true
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - |
        read -p "Enter image name (default: debian): " IMAGE
        IMAGE=${IMAGE:-debian}
        kubectl --kubeconfig=$KUBECONFIG debug -it --context $CONTEXT -n=$NAMESPACE $POD --target=$NAME --image=$IMAGE --share-processes -- bash

  log-viewer:
    shortCut: Shift-J
    description: Stream JSON logs (message only)
    scopes:
      - containers
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        kubectl logs -f --context $CONTEXT -n $NAMESPACE $POD -c $NAME 2>&1 | while IFS= read -r line; do
          msg=$(printf '%s' "$line" | jq -r '.message // empty' 2>/dev/null)
          if [ -n "$msg" ]; then
            level=$(printf '%s' "$line" | jq -r '.level // ""' 2>/dev/null)
            case "$level" in
              ERROR|FATAL)   printf '\033[31m[%s] %s\033[0m\n' "$level" "$msg" ;;
              WARN|WARNING)  printf '\033[33m[%s] %s\033[0m\n' "$level" "$msg" ;;
              INFO)          printf '\033[32m[%s] %s\033[0m\n' "$level" "$msg" ;;
              DEBUG)         printf '\033[36m[%s] %s\033[0m\n' "$level" "$msg" ;;
              *)             printf '%s\n' "$msg" ;;
            esac
          else
            printf '%s\n' "$line"
          fi
        done

  bookmark-jump:
    shortCut: Shift-L
    description: Jump to bookmarked namespace
    scopes:
      - namespaces
      - pods
      - deployments
      - services
      - configmaps
      - secrets
      - ingresses
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        NS=$(sort -u "$HOME/.k9s_bookmarks" 2>/dev/null | fzf --prompt="Namespace> " --height=40% --reverse)
        [ -n "$NS" ] && k9s --context $CONTEXT -n "$NS"

  bookmark-add:
    shortCut: Shift-G
    description: Add current namespace to bookmarks
    scopes:
      - namespaces
      - pods
      - deployments
      - services
      - configmaps
      - secrets
      - ingresses
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        BOOKMARKS_FILE="$HOME/.k9s_bookmarks"
        touch "$BOOKMARKS_FILE"
        if grep -qxF "$NAMESPACE" "$BOOKMARKS_FILE"; then
          echo "'$NAMESPACE' is already bookmarked"
        else
          echo "$NAMESPACE" >> "$BOOKMARKS_FILE"
          echo "Bookmarked '$NAMESPACE'"
        fi
        sleep 1

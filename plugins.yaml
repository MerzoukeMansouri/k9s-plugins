plugins:
  debug:
    shortCut: Shift-D
    description: Add debug container
    dangerous: true
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - |
        read -p "Enter image name (default: debian): " IMAGE
        IMAGE=${IMAGE:-debian}
        kubectl --kubeconfig=$KUBECONFIG debug -it --context $CONTEXT -n=$NAMESPACE $POD --target=$NAME --image=$IMAGE --share-processes -- bash

  log-viewer:
    shortCut: Shift-B
    description: Stream JSON logs (message only)
    scopes:
      - containers
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        kubectl logs -f --context $CONTEXT -n $NAMESPACE $POD -c $NAME 2>&1 \
          | jq -r --unbuffered '
              if   .level == "ERROR" or .level == "FATAL"   then "[31m[\(.level)] \(.message)[0m"
              elif .level == "WARN"  or .level == "WARNING" then "[33m[\(.level)] \(.message)[0m"
              elif .level == "INFO"                         then "[32m[\(.level)] \(.message)[0m"
              elif .level == "DEBUG"                        then "[36m[\(.level)] \(.message)[0m"
              else "\(.message // .)" end' 2>/dev/null \
          | less -R +F

  bookmark-jump:
    shortCut: Shift-L
    description: Jump to bookmarked namespace
    scopes:
      - namespaces
      - pods
      - deployments
      - services
      - configmaps
      - secrets
      - ingresses
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        NS=$(sort -u "$HOME/.k9s_bookmarks" 2>/dev/null | fzf --prompt="Namespace> " --height=40% --reverse)
        [ -n "$NS" ] && k9s --context $CONTEXT -n "$NS"

  bookmark-add:
    shortCut: Shift-G
    description: Add current namespace to bookmarks
    scopes:
      - namespaces
      - pods
      - deployments
      - services
      - configmaps
      - secrets
      - ingresses
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - |
        BOOKMARKS_FILE="$HOME/.k9s_bookmarks"
        touch "$BOOKMARKS_FILE"
        if grep -qxF "$NAMESPACE" "$BOOKMARKS_FILE"; then
          echo "'$NAMESPACE' is already bookmarked"
        else
          echo "$NAMESPACE" >> "$BOOKMARKS_FILE"
          echo "Bookmarked '$NAMESPACE'"
        fi
        sleep 1
